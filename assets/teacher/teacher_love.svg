  <style>
    @keyframes blink { 0%,42%,44%,100%{transform:scaleY(1)}43%{transform:scaleY(0.05)} }
    @keyframes bob { 0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)} }
    @keyframes wave { 0%,100%{transform:rotate(0deg)}20%{transform:rotate(-20deg)}40%{transform:rotate(14deg)}60%{transform:rotate(-8deg)} }
    @keyframes floatUp { 0%{opacity:0;transform:translateY(0) scale(.4)}25%{opacity:.9;transform:translateY(-12px) scale(1)}100%{opacity:0;transform:translateY(-50px) scale(.5)} }
    @keyframes steam { 0%{opacity:.7;transform:translateY(0) scaleX(1)}100%{opacity:0;transform:translateY(-18px) scaleX(1.5)} }
    @keyframes pulse { 0%,100%{transform:scale(1)}50%{transform:scale(1.15)} }
    @keyframes tear { 0%{opacity:0;transform:translateY(0)}30%{opacity:1}100%{opacity:0;transform:translateY(20px)} }
    @keyframes cloudFloat { 0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)} }
    @keyframes dotPulse { 0%,100%{opacity:.3}50%{opacity:1} }
    @keyframes confetti1 { 0%{opacity:1;transform:translateY(0) rotate(0deg)}100%{opacity:0;transform:translateY(60px) rotate(360deg)} }
    @keyframes confetti2 { 0%{opacity:1;transform:translateY(0) rotate(0deg)}100%{opacity:0;transform:translateY(55px) rotate(-270deg)} }
    @keyframes zzz { 0%{opacity:0;transform:translate(0,0) scale(.5)}40%{opacity:1}100%{opacity:0;transform:translate(15px,-30px) scale(1.2)} }
    @keyframes starSpin { 0%,100%{transform:scale(1) rotate(0deg)}50%{transform:scale(1.2) rotate(20deg)} }
    @keyframes sparkle { 0%,100%{opacity:.3;transform:scale(.7)}50%{opacity:1;transform:scale(1)} }
    @keyframes nervousShake { 0%,100%{transform:translateX(0)}25%{transform:translateX(-2px)}75%{transform:translateX(2px)} }
    @keyframes sweatDrop { 0%{opacity:0;transform:translateY(-3px)}50%{opacity:1}100%{opacity:0;transform:translateY(8px)} }
    @keyframes fingerGun { 0%,100%{transform:rotate(0deg)}50%{transform:rotate(-8deg)} }
    @keyframes laughShake { 0%,100%{transform:rotate(0deg)}25%{transform:rotate(-2deg)}75%{transform:rotate(2deg)} }
    @keyframes muscleFlash { 0%,100%{opacity:.6}50%{opacity:1} }
  </style>
