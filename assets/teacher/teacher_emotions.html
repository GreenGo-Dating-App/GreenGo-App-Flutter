<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenGo Teacher Stickers</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: linear-gradient(160deg, #E8F5E9 0%, #F1F8E9 40%, #FFFDE7 100%); min-height: 100vh; padding: 30px; }
  .header { text-align: center; margin-bottom: 36px; }
  .header h1 { color: #1B5E20; font-size: 32px; font-weight: 800; letter-spacing: -0.5px; }
  .header p { color: #66BB6A; font-size: 14px; margin-top: 6px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 24px; max-width: 1500px; margin: 0 auto; }
  .card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 8px 32px rgba(46,125,50,0.08); transition: transform 0.25s, box-shadow 0.25s; }
  .card:hover { transform: translateY(-5px); box-shadow: 0 16px 48px rgba(46,125,50,0.15); }
  .card-label { background: linear-gradient(135deg, #43A047, #2E7D32); color: white; padding: 10px 20px; font-weight: 700; font-size: 14px; text-transform: uppercase; letter-spacing: 1.5px; display: flex; align-items: center; gap: 8px; }
  .card-label span { font-size: 20px; }
  .svg-wrap { padding: 12px 12px 0; background: #FCFCFC; }
  .svg-wrap svg { width: 100%; display: block; }
  .card-bottom { padding: 10px 16px 14px; border-top: 1px solid #E8F5E9; }
  .card-bottom label { font-size: 10px; color: #BDBDBD; text-transform: uppercase; letter-spacing: 1.2px; display: block; margin-bottom: 4px; }
  .card-bottom input { width: 100%; padding: 8px 14px; border: 2px solid #E0E0E0; border-radius: 10px; font-size: 14px; font-family: inherit; transition: border-color 0.2s; background: #FAFAFA; }
  .card-bottom input:focus { border-color: #4CAF50; outline: none; background: white; }

  /* === ENTRANCE ANIMATION (cloud only) === */
  @keyframes cloudBounceIn {
    0% { opacity: 0; transform: scale(0) rotate(-8deg); }
    50% { opacity: 1; transform: scale(1.15) rotate(3deg); }
    70% { transform: scale(0.92) rotate(-1deg); }
    85% { transform: scale(1.05) rotate(0deg); }
    100% { opacity: 1; transform: scale(1) rotate(0deg); }
  }
  @keyframes textPopIn {
    0% { opacity: 0; transform: scale(0.5); }
    60% { opacity: 1; transform: scale(1.05); }
    100% { opacity: 1; transform: scale(1); }
  }

  /* === LOOP ANIMATIONS === */
  @keyframes blink { 0%,42%,44%,100%{transform:scaleY(1)}43%{transform:scaleY(0.05)} }
  @keyframes bob { 0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)} }
  @keyframes wave { 0%,100%{transform:rotate(0deg)}20%{transform:rotate(-20deg)}40%{transform:rotate(14deg)}60%{transform:rotate(-8deg)} }
  @keyframes floatUp { 0%{opacity:0;transform:translateY(0) scale(.4)}25%{opacity:.9;transform:translateY(-12px) scale(1)}100%{opacity:0;transform:translateY(-50px) scale(.5)} }
  @keyframes steam { 0%{opacity:.7;transform:translateY(0) scaleX(1)}100%{opacity:0;transform:translateY(-18px) scaleX(1.5)} }
  @keyframes pulse { 0%,100%{transform:scale(1)}50%{transform:scale(1.15)} }
  @keyframes tear { 0%{opacity:0;transform:translateY(0)}30%{opacity:1}100%{opacity:0;transform:translateY(20px)} }
  @keyframes cloudFloat { 0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)} }
  @keyframes dotPulse { 0%,100%{opacity:.3}50%{opacity:1} }
  @keyframes confetti1 { 0%{opacity:1;transform:translateY(0) rotate(0deg)}100%{opacity:0;transform:translateY(60px) rotate(360deg)} }
  @keyframes confetti2 { 0%{opacity:1;transform:translateY(0) rotate(0deg)}100%{opacity:0;transform:translateY(55px) rotate(-270deg)} }
  @keyframes zzz { 0%{opacity:0;transform:translate(0,0) scale(.5)}40%{opacity:1}100%{opacity:0;transform:translate(15px,-30px) scale(1.2)} }
  @keyframes starSpin { 0%,100%{transform:scale(1) rotate(0deg)}50%{transform:scale(1.2) rotate(20deg)} }
  @keyframes sweatDrop { 0%{opacity:0;transform:translateY(-3px)}30%{opacity:.8}100%{opacity:0;transform:translateY(12px)} }
  @keyframes jump { 0%,100%{transform:translateY(0)}30%{transform:translateY(-10px)}60%{transform:translateY(-4px)} }
  @keyframes fistPump { 0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-8px) rotate(-5deg)} }
  @keyframes headTilt { 0%,100%{transform:rotate(0deg)}50%{transform:rotate(4deg)} }

  /* === EXPRESSION-SPECIFIC ANIMATIONS === */
  @keyframes mouthTalk { 0%,100%{transform:scaleY(1)}25%{transform:scaleY(0.4)}55%{transform:scaleY(1.15)}80%{transform:scaleY(0.6)} }
  @keyframes heartPulse { 0%,100%{transform:scale(1)}50%{transform:scale(1.2)} }
  @keyframes smileGrow { 0%,100%{transform:scaleX(1) scaleY(1)}50%{transform:scaleX(1.06) scaleY(1.08)} }
  @keyframes browTwitch { 0%,100%{transform:translateY(0)}30%{transform:translateY(-2px)}60%{transform:translateY(1px)} }
  @keyframes eyeWiden { 0%,100%{transform:scale(1)}50%{transform:scale(1.08)} }
  @keyframes fingerTap { 0%,100%{transform:translateX(0)}50%{transform:translateX(-3px)} }
  @keyframes eyeDart { 0%,35%{transform:translateX(0)}40%,55%{transform:translateX(3px)}60%,75%{transform:translateX(-2px)}80%,100%{transform:translateX(0)} }
  @keyframes mouthQuiver { 0%,100%{transform:scaleX(1)}30%{transform:scaleX(0.93)}60%{transform:scaleX(1.03)} }
  @keyframes winkCycle { 0%,70%,100%{transform:scaleY(1)}75%,90%{transform:scaleY(0.1)} }
  @keyframes shiver { 0%,100%{transform:translateX(0)}20%{transform:translateX(-1.5px)}40%{transform:translateX(1.5px)}60%{transform:translateX(-1px)}80%{transform:translateX(1px)} }
  @keyframes laughShake { 0%,100%{transform:rotate(0deg)}25%{transform:rotate(-2deg)}75%{transform:rotate(2deg)} }
  @keyframes browFocus { 0%,100%{transform:translateY(0)}50%{transform:translateY(1.5px)} }
  @keyframes sleepyDroop { 0%,100%{transform:scaleY(1)}50%{transform:scaleY(0.7)} }
  @keyframes nod { 0%,100%{transform:translateY(0)}50%{transform:translateY(2px)} }
</style>
</head>
<body>

<div class="header">
  <h1>GreenGo Teacher Stickers</h1>
  <p>Type in the text field to change each cloud message. The cloud auto-resizes!</p>
</div>

<script>

/* ===== SHARED SVG DEFS ===== */
function defs() {
  return `<defs>
    <linearGradient id="shirt" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#43A047"/><stop offset="100%" stop-color="#2E7D32"/></linearGradient>
    <linearGradient id="sk" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#FFCC99"/><stop offset="100%" stop-color="#F0B070"/></linearGradient>
    <linearGradient id="hr" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#5D4037"/><stop offset="100%" stop-color="#3E2723"/></linearGradient>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#f5f5f5"/></linearGradient>
    <filter id="cloudSh" x="-25%" y="-25%" width="160%" height="170%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur"/>
      <feOffset in="blur" dx="2" dy="4" result="off"/>
      <feFlood flood-color="#000" flood-opacity=".08" result="color"/>
      <feComposite in="color" in2="off" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>`;
}

}

/* ===== REUSABLE EYE HELPERS ===== */
function openEyes() {
  return `
  <ellipse cx="156" cy="170" rx="10" ry="9" fill="white"/>
  <ellipse cx="186" cy="170" rx="10" ry="9" fill="white"/>

/* ===== 18 FACE EXPRESSIONS ===== */
function faceHappy() {
  return `
  <path d="M149,170 C152,163 160,163 163,170" fill="none" stroke="#3E2723" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M179,170 C182,163 190,163 193,170" fill="none" stroke="#3E2723" stroke-width="2.5" stroke-linecap="round"/>

  </g>

    <path d="M148,196 C158,210 182,210 192,196" fill="none" stroke="#C62828" stroke-width="2.5" stroke-linecap="round"/>

}

function faceAngry() {
  return `

function faceSurprised() {
  return `
  <g style="transform-origin:170px 169px; animation:eyeWiden 1.5s ease-in-out infinite">
    <ellipse cx="156" cy="169" rx="12" ry="12" fill="white" stroke="#D7CCC8" stroke-width=".5"/>

function faceSilent() {

/* ===== CLOUD PATH — puffy organic shape ===== */
function createCloudPath(cx, cy, w, h) {
  var pw = Math.max(w, 55) / 2 + 22;
  var ph = Math.max(h, 32) / 2 + 18;
  var bx = pw * 0.3;
  var by = ph * 0.3;
  return `
    M ${cx-pw+bx},${cy+ph}
    Q ${cx-pw-bx*0.6},${cy+ph*0.4} ${cx-pw},${cy+ph*0.1}
    Q ${cx-pw-bx*0.5},${cy-ph*0.4} ${cx-pw+bx*0.8},${cy-ph+by*0.5}
    Q ${cx-pw*0.45},${cy-ph-by*1.6} ${cx-bx*0.5},${cy-ph}
    Q ${cx},${cy-ph-by*2} ${cx+bx*0.5},${cy-ph}
    Q ${cx+pw*0.45},${cy-ph-by*1.6} ${cx+pw-bx*0.8},${cy-ph+by*0.5}
    Q ${cx+pw+bx*0.5},${cy-ph*0.4} ${cx+pw},${cy+ph*0.1}
    Q ${cx+pw+bx*0.6},${cy+ph*0.4} ${cx+pw-bx},${cy+ph}
    Q ${cx+pw*0.3},${cy+ph+by*0.6} ${cx},${cy+ph}
    Q ${cx-pw*0.3},${cy+ph+by*0.6} ${cx-pw+bx},${cy+ph}
    Z`;
}

/* ===== BUILD ALL CARDS ===== */
const grid = document.getElementById('grid');

  const isThink = e.id === 'thinking';
  const gl = p.gl ? glasses() : sunglasses();
  const cloudDelay = idx * 0.06;
  const textDelay = cloudDelay + 0.35;

  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-label"><span>${e.icon}</span> ${e.label}</div>
    <div class="svg-wrap">
      <svg id="svg-${e.id}" viewBox="0 0 450 465" xmlns="http://www.w3.org/2000/svg">
        ${defs()}

        <!-- CLOUD (behind character) -->
        <g id="cloudGroup-${e.id}" style="opacity:0; transform-origin:330px 85px; animation: cloudBounceIn 0.7s cubic-bezier(.34,1.56,.64,1) ${cloudDelay}s forwards, cloudFloat 3.5s ease-in-out ${cloudDelay+0.7}s infinite" filter="url(#cloudSh)">
          <path id="cloud-${e.id}" d="" fill="url(#cloudGrad)" stroke="#E0E0E0" stroke-width="2"/>
          <path id="tail-${e.id}" d="" fill="url(#cloudGrad)" stroke="#E0E0E0" stroke-width="2"/>
          ${isThink ? `
            <circle id="dot1-${e.id}" r="6" fill="url(#cloudGrad)" stroke="#E0E0E0" stroke-width="1.5" style="animation:dotPulse 1.5s ease-in-out ${cloudDelay+0.7}s infinite"/>
            <circle id="dot2-${e.id}" r="4" fill="url(#cloudGrad)" stroke="#E0E0E0" stroke-width="1.5" style="animation:dotPulse 1.5s ease-in-out ${cloudDelay+1.1}s infinite"/>
            <circle id="dot3-${e.id}" r="2.5" fill="url(#cloudGrad)" stroke="#E0E0E0" stroke-width="1.5" style="animation:dotPulse 1.5s ease-in-out ${cloudDelay+1.5}s infinite"/>
          ` : ''}
        </g>
        <text id="text-${e.id}" x="330" y="85" font-family="'Segoe UI',system-ui,sans-serif" font-size="15" fill="#4E342E" text-anchor="middle" font-weight="700" style="opacity:0; transform-origin:330px 85px; animation: textPopIn 0.4s ease-out ${textDelay}s forwards"></text>

        <!-- CHARACTER -->
        <g ${animStyle}>
          ${bodyBase()}
          ${neck()}
          ${headShape()}
          ${ears()}
          ${p.face()}
          ${hair()}
          ${gl}
          ${p.arms()}
        </g>
      </svg>
    </div>
    <div class="card-bottom">
      <label>Cloud text</label>
      <input id="input-${e.id}" type="text" value="${e.text.replace(/"/g,'&quot;')}" oninput="updateBubble('${e.id}')"/>
    </div>
  `;
  grid.appendChild(card);
});

/* ===== UPDATE BUBBLE FUNCTION ===== */
function updateBubble(id) {
  const input = document.getElementById('input-' + id);
  const textEl = document.getElementById('text-' + id);
  const cloudEl = document.getElementById('cloud-' + id);
  const tailEl = document.getElementById('tail-' + id);
  const svgEl = document.getElementById('svg-' + id);
  const isThink = id === 'thinking';
  const val = input.value || '';

  if (!val.trim()) {
    cloudEl.setAttribute('d', '');
    tailEl.setAttribute('d', '');
    textEl.innerHTML = '';
    if (isThink) ['dot1','dot2','dot3'].forEach(p => {
      const d = document.getElementById(p+'-'+id);
      if(d){ d.setAttribute('cx','0'); d.setAttribute('cy','0'); d.style.display='none'; }
    });
    svgEl.setAttribute('viewBox', '0 0 450 465');
    return;
  }

  const words = val.split(' ');
  const lines = [];
  let cur = '';
  words.forEach(w => {
    if ((cur + ' ' + w).trim().length > 18 && cur) { lines.push(cur.trim()); cur = w; }
    else { cur = cur ? cur + ' ' + w : w; }
  });
  if (cur) lines.push(cur.trim());

  const baseX = 330, lineH = 20;
  const totalH = lines.length * lineH;
  const startY = 85 - totalH / 2 + lineH * 0.35;

  textEl.innerHTML = '';
  lines.forEach((line, i) => {
    const ts = document.createElementNS('http://www.w3.org/2000/svg', 'tspan');
    ts.setAttribute('x', String(baseX));
    ts.setAttribute('dy', i === 0 ? '0' : String(lineH));
    ts.textContent = line;
    textEl.appendChild(ts);
  });
  textEl.setAttribute('y', String(startY));

  const bbox = textEl.getBBox();
  const cx = bbox.x + bbox.width / 2;
  const cy = bbox.y + bbox.height / 2;

  cloudEl.setAttribute('d', createCloudPath(cx, cy, bbox.width, bbox.height));

  if (isThink) {
    tailEl.setAttribute('d', '');
    const tx = cx - (bbox.width/2 + 22) * 0.35;
    const ty = cy + (bbox.height/2 + 18) + 14;
    ['dot1','dot2','dot3'].forEach((p, i) => {
      const d = document.getElementById(p + '-' + id);
      if(d){ d.setAttribute('cx', String(tx - i*14 - 5)); d.setAttribute('cy', String(ty + i*16)); d.style.display=''; }
    });
  } else {
    const tx = cx - (bbox.width/2 + 22) * 0.3;
    const ty = cy + (bbox.height/2 + 18) + 10;
    tailEl.setAttribute('d', `M ${tx+18},${ty-6} Q ${tx-3},${ty+18} ${tx-20},${ty+32} Q ${tx+6},${ty+12} ${tx+28},${ty-4}`);
  }

  const rightEdge = bbox.x + bbox.width + 55;
  svgEl.setAttribute('viewBox', `0 0 ${Math.max(450, Math.ceil(rightEdge))} 465`);
}

// Init all bubbles
EMOTIONS.forEach(e => updateBubble(e.id));
