<!-- Translation Race Icon -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="trBubble1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="trBubble2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="trFlag" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="50%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="trTrack" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F1F5F9"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <filter id="bubbleShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
    <filter id="flagShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Track background -->
  <rect x="40" y="140" width="432" height="90" rx="45" fill="url(#trTrack)" stroke="#CBD5E1" stroke-width="2"/>
  <rect x="40" y="290" width="432" height="90" rx="45" fill="url(#trTrack)" stroke="#CBD5E1" stroke-width="2"/>

  <!-- Lane divider dashes - top track -->
  <line x1="70" y1="185" x2="440" y2="185" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="16,10"/>
  <!-- Lane divider dashes - bottom track -->
  <line x1="70" y1="335" x2="440" y2="335" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="16,10"/>

  <!-- Finish line (checkerboard) -->
  <g filter="url(#flagShadow)">
    <!-- Pole -->
    <rect x="430" y="90" width="7" height="350" rx="3.5" fill="#94A3B8"/>
    <circle cx="433" cy="90" r="8" fill="#EF4444"/>
    <!-- Flag -->
    <g>
      <rect x="437" y="92" width="50" height="36" fill="white" stroke="#94A3B8" stroke-width="1"/>
      <!-- Checker pattern -->
      <rect x="437" y="92" width="12.5" height="12" fill="#1E293B"/>
      <rect x="462" y="92" width="12.5" height="12" fill="#1E293B"/>
      <rect x="449.5" y="104" width="12.5" height="12" fill="#1E293B"/>
      <rect x="474.5" y="104" width="12.5" height="12" fill="#1E293B"/>
      <rect x="437" y="116" width="12.5" height="12" fill="#1E293B"/>
      <rect x="462" y="116" width="12.5" height="12" fill="#1E293B"/>
      <animateTransform attributeName="transform" type="rotate" values="0 437 110;3 437 110;0 437 110;-2 437 110;0 437 110" dur="1.2s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- Speed lines - top lane -->
  <g opacity="0.5">
    <line x1="30" y1="170" x2="70" y2="170" stroke="#818CF8" stroke-width="3" stroke-linecap="round">
      <animate attributeName="x1" values="60;20;60" dur="0.8s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="90;50;90" dur="0.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.15;0.6" dur="0.8s" repeatCount="indefinite"/>
    </line>
    <line x1="40" y1="185" x2="85" y2="185" stroke="#818CF8" stroke-width="2.5" stroke-linecap="round">
      <animate attributeName="x1" values="50;15;50" dur="0.9s" begin="0.15s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="95;45;95" dur="0.9s" begin="0.15s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="0.9s" begin="0.15s" repeatCount="indefinite"/>
    </line>
    <line x1="55" y1="200" x2="95" y2="200" stroke="#818CF8" stroke-width="2" stroke-linecap="round">
      <animate attributeName="x1" values="70;25;70" dur="0.75s" begin="0.3s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="105;55;105" dur="0.75s" begin="0.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="0.75s" begin="0.3s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Speed lines - bottom lane -->
  <g opacity="0.5">
    <line x1="50" y1="320" x2="100" y2="320" stroke="#F97316" stroke-width="3" stroke-linecap="round">
      <animate attributeName="x1" values="70;25;70" dur="0.85s" begin="0.1s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="105;55;105" dur="0.85s" begin="0.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.15;0.6" dur="0.85s" begin="0.1s" repeatCount="indefinite"/>
    </line>
    <line x1="40" y1="335" x2="90" y2="335" stroke="#F97316" stroke-width="2.5" stroke-linecap="round">
      <animate attributeName="x1" values="55;15;55" dur="0.95s" begin="0.25s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="100;50;100" dur="0.95s" begin="0.25s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="0.95s" begin="0.25s" repeatCount="indefinite"/>
    </line>
    <line x1="60" y1="350" x2="100" y2="350" stroke="#F97316" stroke-width="2" stroke-linecap="round">
      <animate attributeName="x1" values="80;30;80" dur="0.8s" begin="0.4s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="115;60;115" dur="0.8s" begin="0.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="0.8s" begin="0.4s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Top speech bubble (English) -->
  <g filter="url(#bubbleShadow)">
    <animateTransform attributeName="transform" type="translate" values="-20,0;160,0;-20,0" dur="3s" repeatCount="indefinite"/>
    <!-- Bubble shape -->
    <rect x="100" y="145" width="190" height="80" rx="22" fill="url(#trBubble1)"/>
    <!-- Bubble highlight -->
    <rect x="108" y="150" width="174" height="20" rx="10" fill="white" opacity="0.15"/>
    <!-- Tail -->
    <polygon points="170,225 195,225 180,248" fill="#6366F1"/>
    <!-- Country flag circle -->
    <circle cx="140" cy="185" r="20" fill="white" opacity="0.2"/>
    <text x="140" y="192" font-family="Arial,sans-serif" font-size="22" text-anchor="middle">🇺🇸</text>
    <!-- Text -->
    <text x="225" y="195" font-family="Arial,sans-serif" font-weight="800" font-size="30" fill="white" text-anchor="middle">Hello!</text>
  </g>

  <!-- Bottom speech bubble (Spanish) -->
  <g filter="url(#bubbleShadow)">
    <animateTransform attributeName="transform" type="translate" values="-40,0;130,0;-40,0" dur="3s" begin="0.4s" repeatCount="indefinite"/>
    <!-- Bubble shape -->
    <rect x="100" y="295" width="190" height="80" rx="22" fill="url(#trBubble2)"/>
    <!-- Bubble highlight -->
    <rect x="108" y="300" width="174" height="20" rx="10" fill="white" opacity="0.15"/>
    <!-- Tail -->
    <polygon points="170,295 195,295 180,272" fill="#F97316"/>
    <!-- Country flag circle -->
    <circle cx="140" cy="335" r="20" fill="white" opacity="0.2"/>
    <text x="140" y="342" font-family="Arial,sans-serif" font-size="22" text-anchor="middle">🇪🇸</text>
    <!-- Text -->
    <text x="228" y="345" font-family="Arial,sans-serif" font-weight="800" font-size="30" fill="white" text-anchor="middle">&#161;Hola!</text>
  </g>

  <!-- Motion particles -->
  <circle cx="100" cy="185" r="4" fill="#818CF8" opacity="0">
    <animate attributeName="opacity" values="0;0.6;0" dur="1s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="120;60;120" dur="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="110" cy="335" r="3.5" fill="#F97316" opacity="0">
    <animate attributeName="opacity" values="0;0.6;0" dur="1.1s" begin="0.3s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="130;65;130" dur="1.1s" begin="0.3s" repeatCount="indefinite"/>
  </circle>

  <!-- Trophy decoration top -->
  <text x="256" y="75" font-family="Arial,sans-serif" font-size="48" text-anchor="middle" opacity="0.8">🏆
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-5;0,0" dur="2s" repeatCount="indefinite"/>
  </text>
</svg>
