<!-- Grammar Duel Icon -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="gdSword1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FCA5A5"/>
      <stop offset="50%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
    <linearGradient id="gdSword2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#93C5FD"/>
      <stop offset="50%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="gdBlade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F1F5F9"/>
      <stop offset="40%" stop-color="#E2E8F0"/>
      <stop offset="100%" stop-color="#CBD5E1"/>
    </linearGradient>
    <linearGradient id="gdBlade2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E2E8F0"/>
      <stop offset="40%" stop-color="#CBD5E1"/>
      <stop offset="100%" stop-color="#94A3B8"/>
    </linearGradient>
    <radialGradient id="gdImpact" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="20%" stop-color="#FEF3C7"/>
      <stop offset="50%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#FBBF24" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gdShield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <filter id="gdGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="swordShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background shield emblem -->
  <g opacity="0.12">
    <path d="M256 100 L340 150 L340 290 L256 370 L172 290 L172 150 Z" fill="url(#gdShield)" stroke="#D97706" stroke-width="3"/>
  </g>

  <!-- Left sword (Red - Exclamation) -->
  <g filter="url(#swordShadow)">
    <animateTransform attributeName="transform" type="rotate" values="-40 256 256;-36 256 256;-40 256 256" dur="1.2s" repeatCount="indefinite"/>
    <!-- Blade -->
    <rect x="100" y="245" width="175" height="22" rx="3" fill="url(#gdBlade)" stroke="#94A3B8" stroke-width="1"/>
    <!-- Blade edge highlight -->
    <rect x="100" y="247" width="175" height="5" fill="white" opacity="0.4"/>
    <!-- Blade tip -->
    <polygon points="100,245 100,267 75,256" fill="#CBD5E1" stroke="#94A3B8" stroke-width="1"/>
    <!-- Guard -->
    <ellipse cx="275" cy="256" rx="8" ry="28" fill="url(#gdSword1)" stroke="#B91C1C" stroke-width="2"/>
    <!-- Handle -->
    <rect x="280" y="248" width="55" height="16" rx="4" fill="url(#gdSword1)"/>
    <!-- Handle wrap lines -->
    <line x1="292" y1="248" x2="292" y2="264" stroke="#B91C1C" stroke-width="1.5" opacity="0.4"/>
    <line x1="304" y1="248" x2="304" y2="264" stroke="#B91C1C" stroke-width="1.5" opacity="0.4"/>
    <line x1="316" y1="248" x2="316" y2="264" stroke="#B91C1C" stroke-width="1.5" opacity="0.4"/>
    <!-- Pommel -->
    <circle cx="340" cy="256" r="10" fill="#DC2626" stroke="#B91C1C" stroke-width="2"/>
    <!-- ! symbol on blade -->
    <text x="180" y="264" font-family="Arial,sans-serif" font-weight="900" font-size="20" fill="#EF4444" text-anchor="middle" opacity="0.7">!</text>
  </g>

  <!-- Right sword (Blue - Question) -->
  <g filter="url(#swordShadow)">
    <animateTransform attributeName="transform" type="rotate" values="40 256 256;36 256 256;40 256 256" dur="1.2s" repeatCount="indefinite"/>
    <!-- Blade -->
    <rect x="237" y="245" width="175" height="22" rx="3" fill="url(#gdBlade2)" stroke="#94A3B8" stroke-width="1"/>
    <!-- Blade edge highlight -->
    <rect x="237" y="247" width="175" height="5" fill="white" opacity="0.35"/>
    <!-- Blade tip -->
    <polygon points="412,245 412,267 437,256" fill="#94A3B8" stroke="#64748B" stroke-width="1"/>
    <!-- Guard -->
    <ellipse cx="237" cy="256" rx="8" ry="28" fill="url(#gdSword2)" stroke="#1D4ED8" stroke-width="2"/>
    <!-- Handle -->
    <rect x="177" y="248" width="55" height="16" rx="4" fill="url(#gdSword2)"/>
    <!-- Handle wrap lines -->
    <line x1="190" y1="248" x2="190" y2="264" stroke="#1D4ED8" stroke-width="1.5" opacity="0.4"/>
    <line x1="202" y1="248" x2="202" y2="264" stroke="#1D4ED8" stroke-width="1.5" opacity="0.4"/>
    <line x1="214" y1="248" x2="214" y2="264" stroke="#1D4ED8" stroke-width="1.5" opacity="0.4"/>
    <!-- Pommel -->
    <circle cx="172" cy="256" r="10" fill="#2563EB" stroke="#1D4ED8" stroke-width="2"/>
    <!-- ? symbol on blade -->
    <text x="340" y="264" font-family="Arial,sans-serif" font-weight="900" font-size="20" fill="#3B82F6" text-anchor="middle" opacity="0.7">?</text>
  </g>

  <!-- Impact effect at crossing point -->
  <g filter="url(#gdGlow)">
    <!-- Main burst -->
    <circle cx="256" cy="256" r="22" fill="url(#gdImpact)">
      <animate attributeName="r" values="14;28;14" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.2s" repeatCount="indefinite"/>
    </circle>

    <!-- Spark lines -->
    <line x1="256" y1="226" x2="256" y2="200" stroke="#FBBF24" stroke-width="3" stroke-linecap="round">
      <animate attributeName="y2" values="210;190;210" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite"/>
    </line>
    <line x1="256" y1="286" x2="256" y2="312" stroke="#FBBF24" stroke-width="3" stroke-linecap="round">
      <animate attributeName="y2" values="302;322;302" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite"/>
    </line>
    <line x1="226" y1="236" x2="206" y2="216" stroke="#FBBF24" stroke-width="2.5" stroke-linecap="round">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.2s" begin="0.15s" repeatCount="indefinite"/>
    </line>
    <line x1="286" y1="236" x2="306" y2="216" stroke="#FBBF24" stroke-width="2.5" stroke-linecap="round">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.2s" begin="0.3s" repeatCount="indefinite"/>
    </line>
    <line x1="226" y1="276" x2="206" y2="296" stroke="#FBBF24" stroke-width="2.5" stroke-linecap="round">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.2s" begin="0.45s" repeatCount="indefinite"/>
    </line>
    <line x1="286" y1="276" x2="306" y2="296" stroke="#FBBF24" stroke-width="2.5" stroke-linecap="round">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.2s" begin="0.6s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Small spark particles flying out -->
  <circle cx="230" cy="210" r="3" fill="#FBBF24">
    <animate attributeName="cx" values="250;210;250" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="240;180;240" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="290" cy="215" r="2.5" fill="#FCD34D">
    <animate attributeName="cx" values="260;310;260" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="240;185;240" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="240" cy="300" r="2" fill="#FBBF24">
    <animate attributeName="cx" values="250;215;250" dur="1.3s" begin="0.6s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="270;320;270" dur="1.3s" begin="0.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="1.3s" begin="0.6s" repeatCount="indefinite"/>
  </circle>

  <!-- Floating grammar symbols -->
  <text x="100" y="130" font-family="Georgia,serif" font-weight="bold" font-size="44" fill="#EF4444" opacity="0.6">!
    <animate attributeName="y" values="135;120;135" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2.5s" repeatCount="indefinite"/>
  </text>
  <text x="380" y="130" font-family="Georgia,serif" font-weight="bold" font-size="44" fill="#3B82F6" opacity="0.6">?
    <animate attributeName="y" values="135;120;135" dur="2.5s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2.5s" begin="0.5s" repeatCount="indefinite"/>
  </text>
  <text x="120" y="430" font-family="Georgia,serif" font-weight="bold" font-size="36" fill="#A78BFA" opacity="0.5">&amp;
    <animate attributeName="opacity" values="0.3;0.65;0.3" dur="3s" repeatCount="indefinite"/>
  </text>
  <text x="365" y="430" font-family="Georgia,serif" font-weight="bold" font-size="36" fill="#34D399" opacity="0.5">;
    <animate attributeName="opacity" values="0.3;0.65;0.3" dur="3s" begin="1s" repeatCount="indefinite"/>
  </text>
  <text x="80" y="290" font-family="Georgia,serif" font-size="30" fill="#F472B6" opacity="0.4">"
    <animate attributeName="opacity" values="0.2;0.55;0.2" dur="2.8s" begin="0.3s" repeatCount="indefinite"/>
  </text>
  <text x="410" y="290" font-family="Georgia,serif" font-size="30" fill="#FBBF24" opacity="0.4">"
    <animate attributeName="opacity" values="0.2;0.55;0.2" dur="2.8s" begin="0.8s" repeatCount="indefinite"/>
  </text>

  <!-- VS badge in center -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0" dur="3s" repeatCount="indefinite"/>
    <circle cx="256" cy="256" r="26" fill="#1E293B" opacity="0.85"/>
    <text x="256" y="264" font-family="Arial,sans-serif" font-weight="900" font-size="18" fill="#FBBF24" text-anchor="middle">VS</text>
  </g>
</svg>
