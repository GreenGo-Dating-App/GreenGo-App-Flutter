<!-- Language Tapples Icon -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="ltRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="ltInner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="50%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>
    <radialGradient id="ltCenter" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </radialGradient>
    <linearGradient id="ltPointer" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#B91C1C"/>
    </linearGradient>
    <filter id="wheelShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#4C1D95" flood-opacity="0.4"/>
    </filter>
    <filter id="pointerShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <filter id="catGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Category badges around the wheel -->
  <!-- Food - top -->
  <g>
    <rect x="210" y="28" width="92" height="32" rx="16" fill="#EF4444" opacity="0.9"/>
    <text x="256" y="50" font-family="Arial,sans-serif" font-weight="700" font-size="15" fill="white" text-anchor="middle">Food</text>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
  </g>
  <!-- Animals - top right -->
  <g>
    <rect x="375" y="92" width="100" height="32" rx="16" fill="#F59E0B" opacity="0.9"/>
    <text x="425" y="114" font-family="Arial,sans-serif" font-weight="700" font-size="15" fill="white" text-anchor="middle">Animals</text>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" begin="0.4s" repeatCount="indefinite"/>
  </g>
  <!-- Colors - right -->
  <g>
    <rect x="410" y="240" width="88" height="32" rx="16" fill="#10B981" opacity="0.9"/>
    <text x="454" y="262" font-family="Arial,sans-serif" font-weight="700" font-size="15" fill="white" text-anchor="middle">Colors</text>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" begin="0.8s" repeatCount="indefinite"/>
  </g>
  <!-- Sports - bottom right -->
  <g>
    <rect x="368" y="378" width="90" height="32" rx="16" fill="#3B82F6" opacity="0.9"/>
    <text x="413" y="400" font-family="Arial,sans-serif" font-weight="700" font-size="15" fill="white" text-anchor="middle">Sports</text>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" begin="1.2s" repeatCount="indefinite"/>
  </g>
  <!-- Music - bottom -->
  <g>
    <rect x="212" y="450" width="88" height="32" rx="16" fill="#EC4899" opacity="0.9"/>
    <text x="256" y="472" font-family="Arial,sans-serif" font-weight="700" font-size="15" fill="white" text-anchor="middle">Music</text>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" begin="1.6s" repeatCount="indefinite"/>
  </g>
  <!-- Travel - bottom left -->
  <g>
    <rect x="50" y="378" width="88" height="32" rx="16" fill="#8B5CF6" opacity="0.9"/>
    <text x="94" y="400" font-family="Arial,sans-serif" font-weight="700" font-size="15" fill="white" text-anchor="middle">Travel</text>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" begin="2s" repeatCount="indefinite"/>
  </g>
  <!-- School - left -->
  <g>
    <rect x="14" y="240" width="88" height="32" rx="16" fill="#F97316" opacity="0.9"/>
    <text x="58" y="262" font-family="Arial,sans-serif" font-weight="700" font-size="15" fill="white" text-anchor="middle">School</text>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" begin="2.4s" repeatCount="indefinite"/>
  </g>
  <!-- Family - top left -->
  <g>
    <rect x="42" y="92" width="88" height="32" rx="16" fill="#14B8A6" opacity="0.9"/>
    <text x="86" y="114" font-family="Arial,sans-serif" font-weight="700" font-size="15" fill="white" text-anchor="middle">Family</text>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" begin="2.8s" repeatCount="indefinite"/>
  </g>

  <!-- Connecting dots from categories to wheel -->
  <circle cx="256" cy="70" r="4" fill="#EF4444" opacity="0.5"/>
  <circle cx="400" cy="135" r="4" fill="#F59E0B" opacity="0.5"/>
  <circle cx="430" cy="256" r="4" fill="#10B981" opacity="0.5"/>
  <circle cx="393" cy="380" r="4" fill="#3B82F6" opacity="0.5"/>
  <circle cx="256" cy="442" r="4" fill="#EC4899" opacity="0.5"/>
  <circle cx="119" cy="380" r="4" fill="#8B5CF6" opacity="0.5"/>
  <circle cx="82" cy="256" r="4" fill="#F97316" opacity="0.5"/>
  <circle cx="119" cy="135" r="4" fill="#14B8A6" opacity="0.5"/>

  <!-- Main spinning wheel -->
  <g filter="url(#wheelShadow)">
    <animateTransform attributeName="transform" type="rotate" values="0 256 256;360 256 256" dur="4s" repeatCount="indefinite"/>

    <!-- Wheel outer ring -->
    <circle cx="256" cy="256" r="150" fill="url(#ltRing)"/>
    <!-- Wheel inner background -->
    <circle cx="256" cy="256" r="132" fill="url(#ltInner)"/>

    <!-- Segment dividers -->
    <g stroke="white" stroke-width="1.5" opacity="0.25">
      <line x1="256" y1="124" x2="256" y2="388"/>
      <line x1="124" y1="256" x2="388" y2="256"/>
      <line x1="163" y1="163" x2="349" y2="349"/>
      <line x1="349" y1="163" x2="163" y2="349"/>
    </g>

    <!-- Segment color fills (alternating subtle tints) -->
    <path d="M256 124 A132 132 0 0 1 349 163 L256 256 Z" fill="white" opacity="0.06"/>
    <path d="M349 349 A132 132 0 0 1 256 388 L256 256 Z" fill="white" opacity="0.06"/>
    <path d="M163 163 A132 132 0 0 1 256 124 L256 256 Z" fill="white" opacity="0.06"/>
    <path d="M256 388 A132 132 0 0 1 163 349 L256 256 Z" fill="white" opacity="0.06"/>

    <!-- Letters arranged in circle -->
    <text x="256" y="160" font-family="Arial,sans-serif" font-weight="900" font-size="36" fill="white" text-anchor="middle">A</text>
    <text x="335" y="195" font-family="Arial,sans-serif" font-weight="900" font-size="36" fill="white" text-anchor="middle">B</text>
    <text x="360" y="268" font-family="Arial,sans-serif" font-weight="900" font-size="36" fill="white" text-anchor="middle">C</text>
    <text x="332" y="340" font-family="Arial,sans-serif" font-weight="900" font-size="36" fill="white" text-anchor="middle">D</text>
    <text x="256" y="365" font-family="Arial,sans-serif" font-weight="900" font-size="36" fill="white" text-anchor="middle">E</text>
    <text x="180" y="340" font-family="Arial,sans-serif" font-weight="900" font-size="36" fill="white" text-anchor="middle">F</text>
    <text x="152" y="268" font-family="Arial,sans-serif" font-weight="900" font-size="36" fill="white" text-anchor="middle">G</text>
    <text x="178" y="195" font-family="Arial,sans-serif" font-weight="900" font-size="36" fill="white" text-anchor="middle">H</text>

    <!-- Outer ring tick marks -->
    <g stroke="white" stroke-width="3" opacity="0.4">
      <line x1="256" y1="108" x2="256" y2="124"/>
      <line x1="360" y1="151" x2="349" y2="163"/>
      <line x1="400" y1="256" x2="388" y2="256"/>
      <line x1="360" y1="361" x2="349" y2="349"/>
      <line x1="256" y1="404" x2="256" y2="388"/>
      <line x1="152" y1="361" x2="163" y2="349"/>
      <line x1="112" y1="256" x2="124" y2="256"/>
      <line x1="152" y1="151" x2="163" y2="163"/>
    </g>
  </g>

  <!-- Center hub (non-spinning) -->
  <circle cx="256" cy="256" r="34" fill="url(#ltCenter)" stroke="#5B21B6" stroke-width="4"/>
  <!-- Hub shine -->
  <ellipse cx="248" cy="248" rx="14" ry="10" fill="white" opacity="0.2" transform="rotate(-20 248 248)"/>
  <!-- Hub inner dot -->
  <circle cx="256" cy="256" r="10" fill="white" opacity="0.7"/>

  <!-- Fixed pointer arrow at top -->
  <g filter="url(#pointerShadow)">
    <polygon points="256,94 242,124 270,124" fill="url(#ltPointer)" stroke="#991B1B" stroke-width="2"/>
    <!-- Pointer shine -->
    <polygon points="256,98 250,118 256,115" fill="white" opacity="0.3"/>
  </g>
</svg>
