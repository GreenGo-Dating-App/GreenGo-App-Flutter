<!-- Picture Guess Icon -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="pgFrame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="30%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="pgInner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="pgSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#BFDBFE"/>
      <stop offset="100%" stop-color="#EFF6FF"/>
    </linearGradient>
    <linearGradient id="pgMtn1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="pgMtn2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6EE7B7"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <radialGradient id="pgSun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="60%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </radialGradient>
    <linearGradient id="pgQ" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="pgPill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <filter id="frameShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#92400E" flood-opacity="0.3"/>
    </filter>
    <filter id="qGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="innerClip">
      <rect x="110" y="95" width="292" height="270" rx="6"/>
    </clipPath>
  </defs>

  <!-- Frame with shadow -->
  <g filter="url(#frameShadow)">
    <!-- Outer frame -->
    <rect x="80" y="65" width="352" height="330" rx="12" fill="url(#pgFrame)"/>
    <!-- Frame bevel highlight -->
    <rect x="84" y="69" width="344" height="10" rx="5" fill="white" opacity="0.3"/>
    <!-- Frame inner border -->
    <rect x="106" y="91" width="300" height="278" rx="8" fill="#B45309" opacity="0.4"/>
  </g>

  <!-- Inner picture area -->
  <g clip-path="url(#innerClip)">
    <!-- Sky -->
    <rect x="110" y="95" width="292" height="270" fill="url(#pgSky)"/>

    <!-- Clouds -->
    <g opacity="0.6">
      <ellipse cx="180" cy="140" rx="35" ry="16" fill="white"/>
      <ellipse cx="200" cy="135" rx="28" ry="18" fill="white"/>
      <ellipse cx="165" cy="138" rx="22" ry="12" fill="white"/>
    </g>
    <g opacity="0.4">
      <ellipse cx="340" cy="155" rx="30" ry="14" fill="white"/>
      <ellipse cx="360" cy="150" rx="24" ry="16" fill="white"/>
    </g>

    <!-- Sun -->
    <circle cx="365" cy="130" r="26" fill="url(#pgSun)"/>
    <!-- Sun rays -->
    <g opacity="0.3">
      <line x1="365" y1="96" x2="365" y2="86" stroke="#FBBF24" stroke-width="3" stroke-linecap="round">
        <animate attributeName="opacity" values="0.2;0.5;0.2" dur="2s" repeatCount="indefinite"/>
      </line>
      <line x1="395" y1="105" x2="402" y2="98" stroke="#FBBF24" stroke-width="3" stroke-linecap="round">
        <animate attributeName="opacity" values="0.3;0.5;0.3" dur="2s" begin="0.3s" repeatCount="indefinite"/>
      </line>
      <line x1="399" y1="130" x2="410" y2="130" stroke="#FBBF24" stroke-width="3" stroke-linecap="round">
        <animate attributeName="opacity" values="0.2;0.5;0.2" dur="2s" begin="0.6s" repeatCount="indefinite"/>
      </line>
    </g>

    <!-- Mountains -->
    <polygon points="110,365 210,195 310,365" fill="url(#pgMtn1)"/>
    <polygon points="230,365 320,230 402,365" fill="url(#pgMtn2)"/>
    <!-- Snow caps -->
    <polygon points="210,195 195,230 225,230" fill="white" opacity="0.7"/>

    <!-- Ground -->
    <rect x="110" y="330" width="292" height="35" fill="#86EFAC" opacity="0.5"/>
  </g>

  <!-- Frosted overlay for mystery effect -->
  <rect x="110" y="95" width="292" height="270" rx="6" fill="white" opacity="0.15">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Question mark with glow -->
  <g filter="url(#qGlow)">
    <text x="256" y="285" font-family="Arial,sans-serif" font-weight="900" font-size="150" fill="url(#pgQ)" text-anchor="middle">
      <animate attributeName="font-size" values="130;160;130" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.95;0.55;0.95" dur="2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="0 256 235;-10 256 235;10 256 235;0 256 235" dur="2.5s" repeatCount="indefinite"/>
      ?</text>
  </g>

  <!-- Answer pill at bottom -->
  <g>
    <animate attributeName="opacity" values="0;0;0;1;1;1;0" dur="4s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,15;0,15;0,15;0,0;0,0;0,0;0,15" dur="4s" repeatCount="indefinite"/>
    <rect x="166" y="418" width="180" height="52" rx="26" fill="url(#pgPill)"/>
    <!-- Pill shine -->
    <rect x="174" y="422" width="164" height="14" rx="7" fill="white" opacity="0.15"/>
    <!-- Checkmark circle -->
    <circle cx="196" cy="444" r="14" fill="white" opacity="0.2"/>
    <polyline points="189,444 194,449 204,438" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="274" y="452" font-family="Arial,sans-serif" font-weight="800" font-size="22" fill="white" text-anchor="middle">APPLE</text>
  </g>

  <!-- Sparkles -->
  <g>
    <path d="M430 70 L434 84 L448 88 L434 92 L430 106 L426 92 L412 88 L426 84 Z" fill="#FBBF24">
      <animate attributeName="opacity" values="0;1;0" dur="1.8s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="scale" values="0.6;1.1;0.6" dur="1.8s" repeatCount="indefinite" additive="sum"/>
    </path>
  </g>
  <g>
    <path d="M85 400 L88 410 L98 413 L88 416 L85 426 L82 416 L72 413 L82 410 Z" fill="#F472B6">
      <animate attributeName="opacity" values="0;1;0" dur="1.8s" begin="0.6s" repeatCount="indefinite"/>
    </path>
  </g>
  <g>
    <path d="M440 380 L443 389 L452 392 L443 395 L440 404 L437 395 L428 392 L437 389 Z" fill="#60A5FA">
      <animate attributeName="opacity" values="0;1;0" dur="1.8s" begin="1.2s" repeatCount="indefinite"/>
    </path>
  </g>
  <g>
    <path d="M80 80 L82 87 L89 89 L82 91 L80 98 L78 91 L71 89 L78 87 Z" fill="#34D399">
      <animate attributeName="opacity" values="0;1;0" dur="2s" begin="0.9s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>
