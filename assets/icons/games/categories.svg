  <!-- Scan/highlight effect sweeping across tiles -->
  <rect x="0" y="56" width="8" height="400" rx="4" fill="#FBBF24" opacity="0">
    <animate attributeName="x" values="46;466;46" dur="4.5s" repeatCount="indefinite"/>
