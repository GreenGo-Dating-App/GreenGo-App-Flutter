<!-- Vocabulary Chain Icon -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="vcLink1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCA5A5"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>
    <linearGradient id="vcLink2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="vcLink3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6EE7B7"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="vcLink4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#93C5FD"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="vcLink5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="chainShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
    <filter id="chainGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Curved path guide (invisible) showing the chain arc -->
  <!-- Chain follows a gentle S-curve -->

  <!-- Link 1 - "W" -->
  <g filter="url(#chainShadow)">
    <animateTransform attributeName="transform" type="translate" values="-40,-20;0,0;0,0;0,0;0,0" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;1;1" dur="4s" repeatCount="indefinite"/>
    <!-- Outer ring -->
    <rect x="28" y="170" width="110" height="70" rx="35" fill="none" stroke="url(#vcLink1)" stroke-width="18"/>
    <!-- Inner shine -->
    <rect x="38" y="175" width="90" height="16" rx="8" fill="white" opacity="0.2"/>
    <!-- Letter -->
    <text x="83" y="218" font-family="Arial,sans-serif" font-weight="900" font-size="36" fill="white" text-anchor="middle" filter="url(#chainGlow)">W</text>
  </g>

  <!-- Link 2 - "O" (interlocked, shifted down) -->
  <g filter="url(#chainShadow)">
    <animateTransform attributeName="transform" type="translate" values="0,30;0,0;0,0;0,0;0,0" dur="4s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;1;1" dur="4s" begin="0.5s" repeatCount="indefinite"/>
    <rect x="108" y="200" width="110" height="70" rx="35" fill="none" stroke="url(#vcLink2)" stroke-width="18"/>
    <rect x="118" y="205" width="90" height="16" rx="8" fill="white" opacity="0.2"/>
    <text x="163" y="248" font-family="Arial,sans-serif" font-weight="900" font-size="36" fill="white" text-anchor="middle" filter="url(#chainGlow)">O</text>
  </g>

  <!-- Link 3 - "R" (interlocked, shifted up) -->
  <g filter="url(#chainShadow)">
    <animateTransform attributeName="transform" type="translate" values="0,-30;0,0;0,0;0,0;0,0" dur="4s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;1;1" dur="4s" begin="1s" repeatCount="indefinite"/>
    <rect x="188" y="170" width="110" height="70" rx="35" fill="none" stroke="url(#vcLink3)" stroke-width="18"/>
    <rect x="198" y="175" width="90" height="16" rx="8" fill="white" opacity="0.2"/>
    <text x="243" y="218" font-family="Arial,sans-serif" font-weight="900" font-size="36" fill="white" text-anchor="middle" filter="url(#chainGlow)">R</text>
  </g>

  <!-- Link 4 - "D" (interlocked, shifted down) -->
  <g filter="url(#chainShadow)">
    <animateTransform attributeName="transform" type="translate" values="0,30;0,0;0,0;0,0;0,0" dur="4s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;1;1" dur="4s" begin="1.5s" repeatCount="indefinite"/>
    <rect x="268" y="200" width="110" height="70" rx="35" fill="none" stroke="url(#vcLink4)" stroke-width="18"/>
    <rect x="278" y="205" width="90" height="16" rx="8" fill="white" opacity="0.2"/>
    <text x="323" y="248" font-family="Arial,sans-serif" font-weight="900" font-size="36" fill="white" text-anchor="middle" filter="url(#chainGlow)">D</text>
  </g>

  <!-- Link 5 - "S" (interlocked, shifted up) -->
  <g filter="url(#chainShadow)">
    <animateTransform attributeName="transform" type="translate" values="40,-20;0,0;0,0;0,0;0,0" dur="4s" begin="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;1;1" dur="4s" begin="2s" repeatCount="indefinite"/>
    <rect x="348" y="170" width="110" height="70" rx="35" fill="none" stroke="url(#vcLink5)" stroke-width="18"/>
    <rect x="358" y="175" width="90" height="16" rx="8" fill="white" opacity="0.2"/>
    <text x="403" y="218" font-family="Arial,sans-serif" font-weight="900" font-size="36" fill="white" text-anchor="middle" filter="url(#chainGlow)">S</text>
  </g>

  <!-- Connection energy pulses between links -->
  <circle cx="138" cy="215" r="6" fill="#F59E0B" opacity="0">
    <animate attributeName="opacity" values="0;0;0.9;0.9;0.9" dur="4s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="3;3;8;5;3" dur="4s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="218" cy="215" r="6" fill="#10B981" opacity="0">
    <animate attributeName="opacity" values="0;0;0.9;0.9;0.9" dur="4s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="r" values="3;3;8;5;3" dur="4s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="298" cy="215" r="6" fill="#3B82F6" opacity="0">
    <animate attributeName="opacity" values="0;0;0.9;0.9;0.9" dur="4s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="3;3;8;5;3" dur="4s" begin="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="378" cy="215" r="6" fill="#8B5CF6" opacity="0">
    <animate attributeName="opacity" values="0;0;0.9;0.9;0.9" dur="4s" begin="2s" repeatCount="indefinite"/>
    <animate attributeName="r" values="3;3;8;5;3" dur="4s" begin="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Title ribbon -->
  <g>
    <animate attributeName="opacity" values="0;0;0;0;1" dur="4s" begin="2s" repeatCount="indefinite"/>
    <rect x="136" y="310" width="240" height="44" rx="22" fill="#1E293B" opacity="0.85"/>
    <text x="256" y="339" font-family="Arial,sans-serif" font-weight="800" font-size="18" fill="white" text-anchor="middle" letter-spacing="3">W O R D S</text>
  </g>

  <!-- Decorative floating dots -->
  <circle cx="60" cy="120" r="6" fill="#EF4444" opacity="0.5">
    <animate attributeName="opacity" values="0.2;0.7;0.2" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="125;115;125" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="130" r="5" fill="#3B82F6" opacity="0.5">
    <animate attributeName="opacity" values="0.2;0.7;0.2" dur="2.5s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="135;120;135" dur="2.5s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="400" r="5" fill="#10B981" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="370" cy="390" r="6" fill="#F59E0B" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3s" begin="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="256" cy="100" r="4" fill="#8B5CF6" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2.8s" begin="0.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Sparkle -->
  <path d="M256 420 L259 430 L269 433 L259 436 L256 446 L253 436 L243 433 L253 430 Z" fill="#FBBF24" opacity="0">
    <animate attributeName="opacity" values="0;0;0;0;0.8" dur="4s" begin="2.2s" repeatCount="indefinite"/>
  </path>
</svg>
