<!-- Word Bomb Icon -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bombBody" cx="38%" cy="32%" r="55%">
      <stop offset="0%" stop-color="#6B6B80"/>
      <stop offset="45%" stop-color="#3D3D52"/>
      <stop offset="100%" stop-color="#1E1E2E"/>
    </radialGradient>
    <radialGradient id="bombShine" cx="35%" cy="30%" r="30%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="explosionCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="25%" stop-color="#FFF7AE"/>
      <stop offset="55%" stop-color="#FFBE0B"/>
      <stop offset="85%" stop-color="#FF6B00"/>
      <stop offset="100%" stop-color="#FF6B00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shadowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="bombShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <filter id="letterGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="256" cy="430" rx="120" ry="18" fill="url(#shadowGrad)"/>

  <!-- Main bomb group with shake -->
  <g filter="url(#bombShadow)">
    <animateTransform attributeName="transform" type="translate" values="0,0;-4,-1;5,1;-3,2;4,-1;-2,1;3,-2;0,0" dur="0.6s" repeatCount="indefinite"/>

    <!-- Bomb body -->
    <circle cx="256" cy="310" r="130" fill="url(#bombBody)"/>
    <!-- Bomb shine -->
    <circle cx="256" cy="310" r="128" fill="url(#bombShine)"/>
    <!-- Specular highlight -->
    <ellipse cx="218" cy="268" rx="40" ry="28" fill="white" opacity="0.12" transform="rotate(-20 218 268)"/>

    <!-- Fuse connector (cylinder on top) -->
    <rect x="240" y="175" width="32" height="24" rx="6" fill="#7B6B50" stroke="#5C4D38" stroke-width="2"/>
    <rect x="243" y="177" width="26" height="6" rx="3" fill="#9A8A6E" opacity="0.6"/>

    <!-- Fuse rope -->
    <path d="M256 175 C256 160, 275 150, 270 135 C265 120, 240 118, 248 100 C252 90, 275 88, 278 78" fill="none" stroke="#8B7355" stroke-width="5" stroke-linecap="round"/>
    <path d="M256 175 C256 160, 275 150, 270 135 C265 120, 240 118, 248 100 C252 90, 275 88, 278 78" fill="none" stroke="#A08B6B" stroke-width="3" stroke-linecap="round" opacity="0.5"/>

    <!-- Skull/crossbones decoration on bomb -->
    <circle cx="256" cy="305" r="18" fill="none" stroke="#555568" stroke-width="3"/>
    <circle cx="249" cy="300" r="4" fill="#555568"/>
    <circle cx="263" cy="300" r="4" fill="#555568"/>
    <path d="M250 313 Q256 318 262 313" fill="none" stroke="#555568" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Fuse fire / explosion at tip -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;-4,-1;5,1;-3,2;4,-1;0,0" dur="0.6s" repeatCount="indefinite"/>
    <!-- Outer flame -->
    <ellipse cx="278" cy="68" rx="22" ry="28" fill="#FF6B00" opacity="0.7">
      <animate attributeName="rx" values="18;26;18" dur="0.3s" repeatCount="indefinite"/>
      <animate attributeName="ry" values="24;32;24" dur="0.3s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Mid flame -->
    <ellipse cx="278" cy="68" rx="14" ry="20" fill="#FFBE0B">
      <animate attributeName="rx" values="12;18;12" dur="0.25s" repeatCount="indefinite"/>
      <animate attributeName="ry" values="16;24;16" dur="0.25s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Core flame -->
    <ellipse cx="278" cy="68" rx="7" ry="10" fill="#FFF7AE">
      <animate attributeName="rx" values="5;9;5" dur="0.2s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Sparks -->
    <circle cx="260" cy="50" r="3" fill="#FFBE0B">
      <animate attributeName="cy" values="55;35;55" dur="0.8s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="262;250;262" dur="0.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="295" cy="52" r="2.5" fill="#FF6B00">
      <animate attributeName="cy" values="58;38;58" dur="0.7s" begin="0.2s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="292;308;292" dur="0.7s" begin="0.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0;1" dur="0.7s" begin="0.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="278" cy="42" r="2" fill="#FFF7AE">
      <animate attributeName="cy" values="48;28;48" dur="0.6s" begin="0.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0;1" dur="0.6s" begin="0.1s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Flying letters with glow -->
  <!-- Letter A - top left -->
  <g filter="url(#letterGlow)">
    <text font-family="Arial,sans-serif" font-weight="900" font-size="52" fill="#FF6B6B">
      <animate attributeName="x" values="220;95;95;220" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="y" values="300;140;140;300" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0.8;0" dur="3s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="0;-25;-25;0" dur="3s" repeatCount="indefinite"/>
      A</text>
  </g>
  <!-- Letter B - top right -->
  <g filter="url(#letterGlow)">
    <text font-family="Arial,sans-serif" font-weight="900" font-size="46" fill="#4ECDC4">
      <animate attributeName="x" values="280;395;395;280" dur="3s" begin="0.3s" repeatCount="indefinite"/>
      <animate attributeName="y" values="300;130;130;300" dur="3s" begin="0.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0.8;0" dur="3s" begin="0.3s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="0;20;20;0" dur="3s" begin="0.3s" repeatCount="indefinite"/>
      B</text>
  </g>
  <!-- Letter C - bottom left -->
  <g filter="url(#letterGlow)">
    <text font-family="Arial,sans-serif" font-weight="900" font-size="44" fill="#FFE66D">
      <animate attributeName="x" values="230;80;80;230" dur="3s" begin="0.6s" repeatCount="indefinite"/>
      <animate attributeName="y" values="330;440;440;330" dur="3s" begin="0.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0.8;0" dur="3s" begin="0.6s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="0;15;15;0" dur="3s" begin="0.6s" repeatCount="indefinite"/>
      C</text>
  </g>
  <!-- Letter D - bottom right -->
  <g filter="url(#letterGlow)">
    <text font-family="Arial,sans-serif" font-weight="900" font-size="48" fill="#A78BFA">
      <animate attributeName="x" values="280;400;400;280" dur="3s" begin="0.9s" repeatCount="indefinite"/>
      <animate attributeName="y" values="340;450;450;340" dur="3s" begin="0.9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0.8;0" dur="3s" begin="0.9s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="0;-18;-18;0" dur="3s" begin="0.9s" repeatCount="indefinite"/>
      D</text>
  </g>
  <!-- Letter E - right -->
  <g filter="url(#letterGlow)">
    <text font-family="Arial,sans-serif" font-weight="900" font-size="40" fill="#F472B6">
      <animate attributeName="x" values="270;420;420;270" dur="3s" begin="1.2s" repeatCount="indefinite"/>
      <animate attributeName="y" values="310;280;280;310" dur="3s" begin="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0.8;0" dur="3s" begin="1.2s" repeatCount="indefinite"/>
      E</text>
  </g>
  <!-- Letter F - left -->
  <g filter="url(#letterGlow)">
    <text font-family="Arial,sans-serif" font-weight="900" font-size="42" fill="#34D399">
      <animate attributeName="x" values="240;60;60;240" dur="3s" begin="1.5s" repeatCount="indefinite"/>
      <animate attributeName="y" values="320;290;290;320" dur="3s" begin="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0.8;0" dur="3s" begin="1.5s" repeatCount="indefinite"/>
      F</text>
  </g>
</svg>
