include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.config.dart"
    - "lib/generated/**"
    - "test/**"
    - "integration_test/**"
    - "scripts/**"
    - "generate_html_report.dart"
  errors:
    invalid_annotation_target: ignore
    # withOpacity / Color.value etc. — large mechanical Flutter SDK migration;
    # silenced to keep analyze output actionable. Migrate to withValues() later.
    deprecated_member_use: ignore
  strong-mode:
    implicit-casts: false
    implicit-dynamic: false

# NOTE: the previous long hand-curated lint list (sort_constructors_first,
# always_put_control_body_on_new_line, avoid_catches_without_on_clauses,
# directives_ordering, omit_local_variable_types, prefer_relative_imports, ...)
# produced ~3k non-blocking info lints. We now rely on the flutter_lints
# baseline. `dart fix` was already applied for the auto-fixable ones.
